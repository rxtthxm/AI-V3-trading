name: Daily Trading Bot

on:
  schedule:
    # รันตอน 19:50 UTC (02:50 น. ไทย) - รองรับช่วงฤดูร้อน
    - cron: '50 19 * * 1-5'
    # รันตอน 20:50 UTC (03:50 น. ไทย) - รองรับช่วงฤดูหนาว
    - cron: '50 20 * * 1-5'
  workflow_dispatch: # ปุ่มนี้เอาไว้กดรันแบบ Manual ได้เองด้วย

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install alpaca-trade-api yfinance pandas numpy xgboost scikit-learn joblib

      - name: Run Trading Bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python bot.py
